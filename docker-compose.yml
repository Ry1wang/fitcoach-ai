services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitcoach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitcoach
      POSTGRES_PASSWORD: fitcoach_dev
      POSTGRES_DB: fitcoach
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcoach"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: fitcoach-db-test
    environment:
      POSTGRES_USER: fitcoach
      POSTGRES_PASSWORD: fitcoach_dev
      POSTGRES_DB: fitcoach_test
    ports:
      - "5433:5432"
    profiles: ["test"]
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcoach -d fitcoach_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitcoach-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitcoach-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fitcoach:fitcoach_dev@postgres:5432/fitcoach
      REDIS_URL: redis://redis:6379/0
      TEST_DATABASE_URL: postgresql+asyncpg://fitcoach:fitcoach_dev@postgres-test:5432/fitcoach_test?ssl=disable
    # ✅ 移除 ports — 只在 Docker 内网暴露，由 Nginx 代理
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploaded_docs:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitcoach-frontend
    restart: unless-stopped
    # ✅ 移除 ports — 由 Nginx 代理静态文件
    expose:
      - "3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  # ✅ 新增 Nginx — Cloudflare Tunnel 的唯一入口
  nginx:
    image: nginx:alpine
    container_name: fitcoach-nginx
    restart: unless-stopped
    ports:
      - "80:80"          # cloudflared 指向 localhost:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  redisdata:
  uploaded_docs: